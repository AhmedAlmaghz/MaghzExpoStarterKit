name: Build Android APK

# ─────────────────────────────────────────────────────────────────────────────
# Builds an Android APK entirely on GitHub runners — no Expo EAS required.
#
# Triggered by pushing a tag matching v* (e.g. v0.1.0, v1.0.0-beta.1)
#
# The APK is uploaded as a GitHub Actions artifact AND attached to a
# GitHub Release so you can download it directly to your phone.
#
# Prerequisites:
#   • A keystore for signing the release build.
#     Generate one with:
#       keytool -genkey -v -keystore release.keystore \
#         -alias release -keyalg RSA -keysize 2048 -validity 10000
#   • Add the keystore base64 and password as repository secrets:
#       RELEASE_KEYSTORE_BASE64  – base64 of your .keystore file
#       RELEASE_KEYSTORE_PASSWORD – keystore password
#       RELEASE_KEY_ALIAS        – key alias (e.g. "release")
#       RELEASE_KEY_PASSWORD      – key password
#     To base64-encode the keystore:
#       base64 -i release.keystore | pbcopy   (macOS)
#       certutil -encode release.keystore tmp.b64  (Windows)
#
# Usage:
#   git tag v0.1.0
#   git push origin v0.1.0
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - "v*"

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: 🏗️ Build Android APK
    runs-on: ubuntu-latest

    env:
      # Gradle opts for memory efficiency on CI
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Xmx4g"

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: 🏗 Setup Java (for Android build)
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: 📦 Install dependencies
        run: |
          npm config set legacy-peer-deps true
          npm install --no-audit --prefer-offline

      - name: 🏗 Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: 🔑 Decode signing keystore
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}

      - name: 🔨 Build release APK
        working-directory: android
        run: |
          if [ -f app/release.keystore ]; then
            echo "🔐 Building signed release APK"
            ./gradlew assembleRelease \
              -PMYAPP_UPLOAD_STORE_FILE=release.keystore \
              -PMYAPP_UPLOAD_STORE_PASSWORD="${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" \
              -PMYAPP_UPLOAD_KEY_ALIAS="${{ secrets.RELEASE_KEY_ALIAS }}" \
              -PMYAPP_UPLOAD_KEY_PASSWORD="${{ secrets.RELEASE_KEY_PASSWORD }}"
          else
            echo "⚠️  No keystore found — building unsigned debug APK"
            ./gradlew assembleDebug
          fi

      - name: 📤 Upload APK as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk
          retention-days: 90

      - name: 🚀 Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
